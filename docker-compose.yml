services:
  postgres:
    image: postgres:16-alpine
    container_name: limpago_postgres
    environment:
      POSTGRES_USER: limpago
      POSTGRES_PASSWORD: limpago_dev
      POSTGRES_DB: limpago
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U limpago -d limpago"]
      interval: 5s
      timeout: 5s
      retries: 5

  flyway:
    image: flyway/flyway:latest
    container_name: limpago_flyway
    depends_on:
      postgres:
        condition: service_healthy
    command: migrate
    volumes:
      - ./db/migrations:/flyway/sql
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/limpago
      FLYWAY_USER: limpago
      FLYWAY_PASSWORD: limpago_dev
      FLYWAY_LOCATIONS: filesystem:/flyway/sql

  api:
    build: .
    container_name: limpago_api
    depends_on:
      flyway:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://limpago:limpago_dev@postgres:5432/limpago?sslmode=disable
      JWT_SEGREDO_ACESSO: ${JWT_SEGREDO_ACESSO:-limpaGo-dev-segredo-acesso-nao-usar-em-producao}
      JWT_SEGREDO_RENOVACAO: ${JWT_SEGREDO_RENOVACAO:-limpaGo-dev-segredo-renovacao-nao-usar-em-producao}
      PORT: "8080"
    ports:
      - "8080:8080"

  zitadel_postgres:
    image: postgres:16-alpine
    container_name: limpago_zitadel_postgres
    environment:
      POSTGRES_USER: zitadel
      POSTGRES_PASSWORD: zitadel_dev
      POSTGRES_DB: zitadel
    ports:
      - "5435:5432"
    volumes:
      - zitadel_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zitadel -d zitadel"]
      interval: 5s
      timeout: 5s
      retries: 5

  zitadel:
    image: ghcr.io/zitadel/zitadel:latest
    container_name: limpago_zitadel
    depends_on:
      zitadel_postgres:
        condition: service_healthy
    command: start-from-init --masterkeyFromEnv --tlsMode disabled
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: zitadel_postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: zitadel_dev
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: zitadel_dev
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_MASTERKEY: ${ZITADEL_MASTERKEY:-chave-mestra-dev-32caracteres!!}
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_EXTERNALPORT: 8085
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: admin@limpago.local
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: "Admin123!"
    ports:
      - "8085:8080"

  zitadel_teste:
    image: ghcr.io/zitadel/zitadel:latest
    container_name: limpago_zitadel_teste
    profiles: ["test"]
    depends_on:
      zitadel_postgres:
        condition: service_healthy
    command: start-from-init --masterkeyFromEnv --tlsMode disabled
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: zitadel_postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: zitadel_dev
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: zitadel_dev
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_MASTERKEY: ${ZITADEL_MASTERKEY:-chave-mestra-dev-32caracteres!!}
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_EXTERNALPORT: 8085
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: admin@limpago.local
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: "Admin123!"
    ports:
      - "8086:8080"

  postgres_teste:
    image: postgres:16-alpine
    container_name: limpago_postgres_teste
    profiles: ["test"]
    environment:
      POSTGRES_USER: limpago
      POSTGRES_PASSWORD: limpago_dev
      POSTGRES_DB: limpago_teste
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U limpago -d limpago_teste"]
      interval: 3s
      timeout: 3s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data

volumes:
  pgdata:
  zitadel_pgdata:
