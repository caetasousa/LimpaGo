basePath: /api/v1
definitions:
  dto.EnderecoDTO:
    properties:
      bairro:
        type: string
      cep:
        type: string
      cidade:
        type: string
      complemento:
        type: string
      estado:
        type: string
      rua:
        type: string
    type: object
  dto.RequisicaoAtualizarLimpeza:
    properties:
      descricao:
        type: string
      duracao_estimada:
        type: number
      nome:
        type: string
      tipo_limpeza:
        type: string
      valor_hora:
        type: number
    type: object
  dto.RequisicaoAtualizarPerfil:
    properties:
      imagem:
        type: string
      nome_completo:
        type: string
      telefone:
        type: string
    type: object
  dto.RequisicaoAtualizarPerfilCliente:
    properties:
      banheiros:
        type: integer
      endereco:
        $ref: '#/definitions/dto.EnderecoDTO'
      observacoes:
        type: string
      quartos:
        type: integer
      tamanho_imovel_m2:
        type: number
      tipo_imovel:
        type: string
    type: object
  dto.RequisicaoAtualizarPerfilFaxineiro:
    properties:
      anos_experiencia:
        type: integer
      cidades_atendidas:
        items:
          type: string
        type: array
      descricao:
        type: string
      especialidades:
        items:
          type: string
        type: array
    type: object
  dto.RequisicaoBloqueio:
    properties:
      data_fim:
        type: string
      data_inicio:
        type: string
    type: object
  dto.RequisicaoCriarAvaliacao:
    properties:
      comentario:
        type: string
      limpeza_id:
        type: integer
      nota:
        type: integer
    type: object
  dto.RequisicaoCriarLimpeza:
    properties:
      descricao:
        type: string
      duracao_estimada:
        type: number
      nome:
        type: string
      tipo_limpeza:
        type: string
      valor_hora:
        type: number
    type: object
  dto.RequisicaoCriarSolicitacao:
    properties:
      data_agendada:
        type: string
      limpeza_id:
        type: integer
    type: object
  dto.RequisicaoDisponibilidade:
    properties:
      dia_semana:
        description: 0=Domingo ... 6=Sábado
        type: integer
      hora_fim:
        description: 1-24
        type: integer
      hora_inicio:
        description: 0-23
        type: integer
    type: object
  dto.RequisicaoRegistro:
    properties:
      email:
        type: string
      nome_usuario:
        type: string
    type: object
  dto.RespostaAvaliacao:
    properties:
      cliente_id:
        type: integer
      comentario:
        type: string
      faxineiro_id:
        type: integer
      id:
        type: integer
      limpeza_id:
        type: integer
      nota:
        type: integer
    type: object
  dto.RespostaBloqueio:
    properties:
      data_fim:
        type: string
      data_inicio:
        type: string
      e_pessoal:
        type: boolean
      faxineiro_id:
        type: integer
      id:
        type: integer
      solicitacao_id:
        type: integer
    type: object
  dto.RespostaDisponibilidade:
    properties:
      dia_semana:
        type: integer
      faxineiro_id:
        type: integer
      hora_fim:
        type: integer
      hora_inicio:
        type: integer
      id:
        type: integer
    type: object
  dto.RespostaErro:
    properties:
      codigo:
        type: integer
      detalhes:
        additionalProperties:
          type: string
        type: object
      mensagem:
        type: string
    type: object
  dto.RespostaEstatisticasFaxineiro:
    properties:
      faxineiro_id:
        type: integer
      media_nota:
        type: number
      total_avaliacoes:
        type: integer
    type: object
  dto.RespostaItemFeed:
    properties:
      data_evento:
        type: string
      limpeza:
        $ref: '#/definitions/dto.RespostaLimpeza'
      numero_linha:
        type: integer
      tipo_evento:
        type: string
    type: object
  dto.RespostaLimpeza:
    properties:
      descricao:
        type: string
      duracao_estimada:
        type: number
      faxineiro_id:
        type: integer
      id:
        type: integer
      nome:
        type: string
      preco_total:
        type: number
      tipo_limpeza:
        type: string
      valor_hora:
        type: number
    type: object
  dto.RespostaPaginaFeed:
    properties:
      itens:
        items:
          $ref: '#/definitions/dto.RespostaItemFeed'
        type: array
      pagina:
        type: integer
      tamanho_pagina:
        type: integer
      tem_mais:
        type: boolean
      total_itens:
        type: integer
    type: object
  dto.RespostaPerfil:
    properties:
      email:
        type: string
      imagem:
        type: string
      nome_completo:
        type: string
      nome_usuario:
        type: string
      telefone:
        type: string
      usuario_id:
        type: integer
    type: object
  dto.RespostaPerfilCliente:
    properties:
      banheiros:
        type: integer
      endereco:
        $ref: '#/definitions/dto.EnderecoDTO'
      faxineiro_preferido_id:
        type: integer
      observacoes:
        type: string
      quartos:
        type: integer
      tamanho_imovel_m2:
        type: number
      tipo_imovel:
        type: string
      usuario_id:
        type: integer
    type: object
  dto.RespostaPerfilFaxineiro:
    properties:
      anos_experiencia:
        type: integer
      cidades_atendidas:
        items:
          type: string
        type: array
      descricao:
        type: string
      especialidades:
        items:
          type: string
        type: array
      usuario_id:
        type: integer
      verificado:
        type: boolean
    type: object
  dto.RespostaSolicitacao:
    properties:
      cliente_id:
        type: integer
      data_agendada:
        type: string
      endereco:
        $ref: '#/definitions/dto.EnderecoDTO'
      id:
        type: integer
      limpeza_id:
        type: integer
      multa_cancelamento:
        type: number
      preco_total:
        type: number
      status:
        type: string
    type: object
  dto.RespostaUsuario:
    properties:
      ativo:
        type: boolean
      email:
        type: string
      id:
        type: integer
      nome_usuario:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API REST para plataforma de serviços de limpeza.
  title: Phresh-Go API
  version: "1.0"
paths:
  /agenda/bloqueios:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.RespostaBloqueio'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.RespostaErro'
      security:
      - ApiKeyAuth: []
      summary: Listar bloqueios do faxineiro autenticado
      tags:
      - agenda
    post:
      consumes:
      - application/json
      parameters:
      - description: Dados do bloqueio
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.RequisicaoBloqueio'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.RespostaBloqueio'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.RespostaErro'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/dto.RespostaErro'
      security:
      - ApiKeyAuth: []
      summary: Criar bloqueio pessoal de agenda
      tags:
      - agenda
  /agenda/bloqueios/{id}:
    delete:
      parameters:
      - description: ID do bloqueio
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.RespostaErro'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.RespostaErro'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.RespostaErro'
      security:
      - ApiKeyAuth: []
      summary: Remover bloqueio pessoal de agenda
      tags:
      - agenda
  /agenda/disponibilidades:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.RespostaDisponibilidade'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.RespostaErro'
      security:
      - ApiKeyAuth: []
      summary: Listar disponibilidades do faxineiro autenticado
      tags:
      - agenda
    post:
      consumes:
      - application/json
      parameters:
      - description: Dados da disponibilidade
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.RequisicaoDisponibilidade'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.RespostaDisponibilidade'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.RespostaErro'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/dto.RespostaErro'
      security:
      - ApiKeyAuth: []
      summary: Adicionar bloco de disponibilidade
      tags:
      - agenda
  /agenda/disponibilidades/{id}:
    delete:
      parameters:
      - description: ID da disponibilidade
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.RespostaErro'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.RespostaErro'
      security:
      - ApiKeyAuth: []
      summary: Remover bloco de disponibilidade
      tags:
      - agenda
  /avaliacoes:
    post:
      consumes:
      - application/json
      parameters:
      - description: Dados da avaliação
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.RequisicaoCriarAvaliacao'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.RespostaAvaliacao'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.RespostaErro'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dto.RespostaErro'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/dto.RespostaErro'
      security:
      - ApiKeyAuth: []
      summary: Criar avaliação de um serviço concluído
      tags:
      - avaliacoes
  /faxineiros/{faxineiro_id}/avaliacoes:
    get:
      parameters:
      - description: ID do faxineiro
        in: path
        name: faxineiro_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.RespostaAvaliacao'
            type: array
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.RespostaErro'
      summary: Listar avaliações de um faxineiro
      tags:
      - avaliacoes
  /faxineiros/{faxineiro_id}/estatisticas:
    get:
      parameters:
      - description: ID do faxineiro
        in: path
        name: faxineiro_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.RespostaEstatisticasFaxineiro'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.RespostaErro'
      summary: Buscar estatísticas de avaliações de um faxineiro
      tags:
      - avaliacoes
  /feed:
    get:
      parameters:
      - default: 1
        description: Número da página
        in: query
        name: pagina
        type: integer
      - default: 20
        description: Itens por página
        in: query
        name: tamanho
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.RespostaPaginaFeed'
      summary: Buscar feed de atividades paginado
      tags:
      - feed
  /limpezas:
    get:
      parameters:
      - default: 1
        description: Número da página
        in: query
        name: pagina
        type: integer
      - default: 20
        description: Itens por página
        in: query
        name: tamanho
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.RespostaLimpeza'
            type: array
      summary: Listar catálogo de limpezas
      tags:
      - limpezas
    post:
      consumes:
      - application/json
      parameters:
      - description: Dados da limpeza
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.RequisicaoCriarLimpeza'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.RespostaLimpeza'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.RespostaErro'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/dto.RespostaErro'
      security:
      - ApiKeyAuth: []
      summary: Criar novo serviço de limpeza
      tags:
      - limpezas
  /limpezas/{id}:
    delete:
      parameters:
      - description: ID da limpeza
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.RespostaErro'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.RespostaErro'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.RespostaErro'
      security:
      - ApiKeyAuth: []
      summary: Deletar serviço de limpeza
      tags:
      - limpezas
    get:
      parameters:
      - description: ID da limpeza
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.RespostaLimpeza'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.RespostaErro'
      summary: Buscar limpeza por ID
      tags:
      - limpezas
    put:
      consumes:
      - application/json
      parameters:
      - description: ID da limpeza
        in: path
        name: id
        required: true
        type: integer
      - description: Dados da limpeza
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.RequisicaoAtualizarLimpeza'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.RespostaLimpeza'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.RespostaErro'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.RespostaErro'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.RespostaErro'
      security:
      - ApiKeyAuth: []
      summary: Atualizar serviço de limpeza
      tags:
      - limpezas
  /limpezas/{limpeza_id}/solicitacoes:
    get:
      parameters:
      - description: ID da limpeza
        in: path
        name: limpeza_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.RespostaSolicitacao'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.RespostaErro'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.RespostaErro'
      security:
      - ApiKeyAuth: []
      summary: Listar solicitações de uma limpeza (faxineiro)
      tags:
      - solicitacoes
  /solicitacoes:
    post:
      consumes:
      - application/json
      parameters:
      - description: Dados da solicitação
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.RequisicaoCriarSolicitacao'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.RespostaSolicitacao'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.RespostaErro'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dto.RespostaErro'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/dto.RespostaErro'
      security:
      - ApiKeyAuth: []
      summary: Criar solicitação de limpeza
      tags:
      - solicitacoes
  /solicitacoes/{cliente_id}/{limpeza_id}/aceitar:
    post:
      parameters:
      - description: ID do cliente
        in: path
        name: cliente_id
        required: true
        type: integer
      - description: ID da limpeza
        in: path
        name: limpeza_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.RespostaSolicitacao'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.RespostaErro'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.RespostaErro'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.RespostaErro'
      security:
      - ApiKeyAuth: []
      summary: Aceitar solicitação de limpeza
      tags:
      - solicitacoes
  /solicitacoes/{cliente_id}/{limpeza_id}/rejeitar:
    post:
      parameters:
      - description: ID do cliente
        in: path
        name: cliente_id
        required: true
        type: integer
      - description: ID da limpeza
        in: path
        name: limpeza_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.RespostaSolicitacao'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.RespostaErro'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.RespostaErro'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.RespostaErro'
      security:
      - ApiKeyAuth: []
      summary: Rejeitar solicitação de limpeza
      tags:
      - solicitacoes
  /solicitacoes/{limpeza_id}/cancelar:
    post:
      parameters:
      - description: ID da limpeza
        in: path
        name: limpeza_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.RespostaSolicitacao'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.RespostaErro'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.RespostaErro'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.RespostaErro'
      security:
      - ApiKeyAuth: []
      summary: Cancelar solicitação de limpeza
      tags:
      - solicitacoes
  /usuarios/eu/limpezas:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.RespostaLimpeza'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.RespostaErro'
      security:
      - ApiKeyAuth: []
      summary: Listar limpezas do faxineiro autenticado
      tags:
      - limpezas
  /usuarios/eu/perfil:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.RespostaPerfil'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.RespostaErro'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.RespostaErro'
      security:
      - ApiKeyAuth: []
      summary: Buscar perfil do usuário autenticado
      tags:
      - usuarios
    put:
      consumes:
      - application/json
      parameters:
      - description: Dados do perfil
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.RequisicaoAtualizarPerfil'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.RespostaPerfil'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.RespostaErro'
      security:
      - ApiKeyAuth: []
      summary: Atualizar perfil base do usuário autenticado
      tags:
      - usuarios
  /usuarios/eu/perfil-cliente:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.RespostaPerfilCliente'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.RespostaErro'
      security:
      - ApiKeyAuth: []
      summary: Buscar perfil de cliente do usuário autenticado
      tags:
      - usuarios
    post:
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.RespostaPerfilCliente'
        "409":
          description: Conflict
          schema:
